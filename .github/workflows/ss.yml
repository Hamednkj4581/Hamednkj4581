on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

env:
  TZ: Asia/Shanghai

jobs:
  job:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v6

      - name: Write to frpc.toml
        shell: bash
        run: |
          cat << EOF > frpc.toml
          user = "VirtualMachine"

          serverAddr = "8.210.61.178"
          serverPort = 7000

          auth.method = "token"
          auth.token = "2f1d3a0e-9b64-4b91-b76b-8cb4a2f2e5d3"

          [[proxies]]
          name = "ssh"
          type = "tcp"
          localIP = "172.17.0.1"
          localPort = 1234
          remotePort = 8888

          [[proxies]]
          name = "ss"
          type = "tcp"
          localIP = "172.17.0.1"
          localPort = 8388
          remotePort = 8389
          EOF

      - name: 运行Linux
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          grep -q '^#\?PasswordAuthentication' /etc/ssh/sshd_config \
            && sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config \
            || echo 'PasswordAuthentication yes' | sudo tee -a /etc/ssh/sshd_config

          grep -q '^#\?PasswordAuthentication' /etc/ssh/sshd_config.d/*.conf \
            && sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config.d/*.conf \
            || echo 'PasswordAuthentication yes' | sudo tee -a /etc/ssh/sshd_config.d/*.conf

          sudo systemctl restart ssh

          echo "runner:mynewpassword" | sudo chpasswd
          docker run -d --name socat-proxy -p 1234:1234 --restart=always alpine/socat TCP-LISTEN:1234,fork TCP:172.17.0.1:22
          docker run -d --name frpc -v ./frpc.toml:/etc/frp/frpc.toml snowdreamtech/frpc
          docker run -d \
            --name shadowsocks \
            --restart unless-stopped \
            -p 8388:8388/tcp \
            -p 8388:8388/udp \
            -e TZ=Asia/Shanghai \
            -e METHOD=aes-256-gcm \
            -e PASSWORD=6a17a5dd-5f76-4b09-b567-9b0d5d449da5 \
            shadowsocks/shadowsocks-libev

          (
            sleep $((355 * 60))
            gh workflow run ss.yml --ref "${GITHUB_REF_NAME}"
            sleep 10
            docker stop frpc socat-proxy shadowsocks
          ) &

          docker logs -f frpc
